<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Noticias — Argentina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css?v=2">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header class="site-header">
    <div class="header-inner">
        <div class="brand">
            <h1 class="logo">Comparador<span class="accent">Noticias</span></h1>
            <p class="tagline">Todas las miradas, una sola verdad</p>
        </div>
        <div class="header-meta">
            <time id="header-date"></time>
            <button id="btn-refresh" class="btn-icon" title="Actualizar noticias">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            </button>
        </div>
    </div>
</header>

<!-- ── Stats bar ──────────────────────────────────────────────────────── -->
<div class="stats-bar">
    <div class="stats-inner">
        <span id="stat-articles">—</span>
        <span class="stats-sep">·</span>
        <span id="stat-groups">—</span>
        <span class="stats-sep">·</span>
        <span id="stat-compared">—</span>
        <span class="stats-sep">·</span>
        <span id="stat-updated">—</span>
    </div>
</div>

<!-- ── Nav / Filters ──────────────────────────────────────────────────── -->
<nav class="filters-bar">
    <div class="filters-inner">
        <div class="filter-group" id="category-filters">
            <button class="filter-btn active" data-category="">Todas</button>
            <button class="filter-btn" data-category="portada">Portada</button>
            <button class="filter-btn" data-category="politica">Política</button>
            <button class="filter-btn" data-category="economia">Economía</button>
            <button class="filter-btn" data-category="sociedad">Sociedad</button>
            <button class="filter-btn" data-category="deportes">Deportes</button>
        </div>
        <div class="filter-group">
            <label class="toggle-label">
                <input type="checkbox" id="toggle-multi" checked>
                <span class="toggle-switch"></span>
                Solo multi-fuente
            </label>
        </div>
        <div class="filter-group">
            <select id="source-filter" class="select-source">
                <option value="">Todas las fuentes</option>
            </select>
        </div>
    </div>
</nav>

<!-- ── Main content ───────────────────────────────────────────────────── -->
<main class="main-content">
    <div id="loading" class="loading-state">
        <div class="spinner"></div>
        <p>Cargando noticias de todos los medios…</p>
    </div>
    <div id="news-grid" class="news-grid"></div>
</main>

<!-- ── Comparison Modal ───────────────────────────────────────────────── -->
<div id="compare-modal" class="modal-overlay" hidden>
    <div class="modal-content">
        <button class="modal-close" id="modal-close">&times;</button>
        <div id="compare-body"></div>
    </div>
</div>

<!-- ── Footer ─────────────────────────────────────────────────────────── -->
<footer class="site-footer">
    <p>Comparador de Noticias — Datos obtenidos de feeds RSS públicos</p>
    <p class="footer-sources" id="footer-sources"></p>
</footer>

<script src="/static/js/app.js?v=2"></script>
</body>
</html>
